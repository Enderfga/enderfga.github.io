name: recover-openclaw
# https://github.com/Enderfga/enderfga.github.io/actions/workflows/recover-openclaw.yml

on:
  workflow_dispatch:
    inputs:
      action:
        description: '操作类型'
        required: true
        default: 'smart-restart'
        type: choice
        options:
          - smart-restart    # 诊断 + 重启
          - force-restart    # 强制重启所有服务
          - status-only      # 只看状态不动

jobs:
  recover:
    runs-on: self-hosted
    timeout-minutes: 5
    env:
      PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
      HOME: "/Users/fanggan"
      SASHA_URL: "http://127.0.0.1:18795/sasha-doctor"
      SASHA_TOKEN: "${{ secrets.SASHA_TOKEN }}"
    steps:
      - name: 0. 环境 + Config 有效性
        timeout-minutes: 1
        shell: bash --noprofile --norc {0}
        run: |
          echo "=== Environment ==="
          echo "date=$(date '+%Y-%m-%d %H:%M:%S %z')"
          echo "uid=$(id -u)"
          which openclaw || echo "openclaw NOT in PATH"
          echo ""

          # 2026-04-07 incident: 不再调用 `openclaw config validate`。
          # 它会启动一个完整的 openclaw CLI 加载所有 plugin，在 plugin loader
          # 出 bug 时（mem0 死循环）会让 runner 跟着卡死，恰恰是这个 workflow
          # 想救的灾难本身。改用纯 python JSON 语法校验，零外部依赖。
          echo "=== Config Validation (local JSON parse) ==="
          if python3 -c "import json,sys; json.load(open('$HOME/.openclaw/openclaw.json'))" 2>/dev/null; then
            echo "PASS: openclaw.json 语法 OK"
          else
            echo "FAIL: openclaw.json JSON 语法错误，gateway 无法启动！"
            python3 -c "import json,sys; json.load(open('$HOME/.openclaw/openclaw.json'))" 2>&1 || true
          fi

      - name: 1. 全面状态诊断
        timeout-minutes: 1
        shell: bash --noprofile --norc {0}
        run: |
          UID_NUM=$(id -u)

          echo "=== Auth Profiles ==="
          # 检查所有 provider auth（不仅是 anthropic）
          # 从 models.json 获取当前活跃模型的 provider
          MODELS_FILE="$HOME/.openclaw/models.json"
          if [ -f "$MODELS_FILE" ]; then
            ACTIVE_PROVIDER=$(python3 -c "
import json
with open('$MODELS_FILE') as f:
    models = json.load(f)
for m in models:
    if m.get('active'):
        print(m.get('provider', 'unknown'))
        break
" 2>/dev/null || echo "unknown")
            echo "Active provider: $ACTIVE_PROVIDER"
            
            # 检查 Anthropic profiles（仅作参考）
            AUTH_FILE="$HOME/.openclaw/agents/main/agent/auth-profiles.json"
            if [ -f "$AUTH_FILE" ]; then
              python3 -c "
import json, time
with open('$AUTH_FILE') as f:
    data = json.load(f)
profiles = data.get('profiles', {})
stats = data.get('usageStats', {})
now_ms = int(time.time() * 1000)
active = {k: v for k, v in profiles.items() if k.startswith('anthropic:') and not k.startswith('_disabled')}
if active:
    print(f'Anthropic profiles: {len(active)}')
    for k, v in active.items():
        ptype = v.get('type', 'unknown')
        cd = stats.get(k, {}).get('cooldownUntil', 0)
        status = 'COOLDOWN' if cd > now_ms else 'OK'
        print(f'  {k}: type={ptype} status={status}')
else:
    print('(No Anthropic profiles - using third-party provider)')
" 2>/dev/null || echo "Failed to parse auth-profiles.json"
            else
              echo "(auth-profiles.json not found - using API key auth)"
            fi
          else
            echo "models.json not found"
          fi
          echo ""

          echo "=== DNS ==="
          # 使用 dig 替代 host（更可靠，更快）
          if dig +short +time=2 +tries=1 api.anthropic.com > /dev/null 2>&1; then
            echo "PASS: DNS resolution OK"
          else
            echo "FAIL: DNS resolution failed for api.anthropic.com"
          fi
          echo ""

          echo "=== Services ==="
          for svc in ai.openclaw.gateway com.sasha.doctor com.cloudflare.cloudflared com.webchat.nextjs com.openclaw.healthcheck; do
            info=$(launchctl print "gui/${UID_NUM}/${svc}" 2>&1 | grep -E "state|pid" | head -2 | tr '\n' ' ')
            echo "$svc: ${info:-not loaded}"
          done
          echo ""

          echo "=== Health Endpoints ==="
          check() {
            local name="$1" url="$2" t="${3:-5}"
            code=$(curl -sf -o /dev/null -w "%{http_code}" --max-time "$t" "$url" 2>/dev/null || echo "000")
            if [ "$code" = "200" ]; then echo "PASS $name"; else echo "FAIL $name (HTTP $code)"; fi
          }
          check "Gateway"       "http://127.0.0.1:18789/"
          check "Sasha-Doctor"  "$SASHA_URL/health"
          check "Webchat"       "http://127.0.0.1:3000/api/health"
          check "CF Tunnel"     "https://claw.enderfga.cn/sasha-doctor/health" 10
          echo ""

          echo "=== Sasha-Doctor Socket Health ==="
          SASHA_PID=$(pgrep -f "sasha-doctor/server.js" | head -1)
          if [ -n "$SASHA_PID" ]; then
            CLOSED=$(lsof -p "$SASHA_PID" 2>/dev/null | grep -c "CLOSE_WAIT\|CLOSED" || echo 0)
            ESTABLISHED=$(lsof -p "$SASHA_PID" 2>/dev/null | grep -c "ESTABLISHED" || echo 0)
            # 强制类型转换，避免整数判断错误
            CLOSED=$((CLOSED + 0))
            ESTABLISHED=$((ESTABLISHED + 0))
            echo "PID=$SASHA_PID  ESTABLISHED=$ESTABLISHED  CLOSED/CLOSE_WAIT=$CLOSED"
            [ "$CLOSED" -gt 50 ] && echo "⚠️  Socket leak detected (>50 stale connections)"
          else
            echo "sasha-doctor not running"
          fi
          echo ""

          echo "=== Gateway Status (TCP probe + process info) ==="
          # 不调用 `openclaw gateway status`：它会 spawn 完整的 openclaw CLI
          # 加载 plugin（2026-04-07 死机根因）。改用直接 TCP 探测端口 + ps 进程信息。
          if nc -zw2 127.0.0.1 18789 2>/dev/null; then
            echo "PASS: port 18789 LISTENING"
          else
            echo "FAIL: port 18789 not listening"
          fi
          GW_PID=$(pgrep -f 'openclaw-gateway' | head -1)
          if [ -n "$GW_PID" ]; then
            ps -p "$GW_PID" -o pid,rss,%cpu,etime,command 2>/dev/null
          else
            echo "no openclaw-gateway process"
          fi
          # 警告: 如果有任何 100% CPU 的 channels/openclaw CLI 子进程,
          # 这是 plugin loader 死循环的征兆——这正是 2026-04-07 死机的特征
          BAD=$(ps -eo pid,pcpu,command | awk '/openclaw-(channels|gateway)|openclaw / && $2+0 > 80 && !/awk/ {print $0}')
          if [ -n "$BAD" ]; then
            echo ""
            echo "⚠️  CRITICAL: detected 100% CPU openclaw process(es) — plugin loader dead loop!"
            echo "$BAD"
          fi

      - name: 2. 执行修复
        if: ${{ github.event.inputs.action != 'status-only' }}
        timeout-minutes: 2
        shell: bash --noprofile --norc {0}
        run: |
          ACTION="${{ github.event.inputs.action }}"
          UID_NUM=$(id -u)
          echo "=== Recovery: ${ACTION} ==="

          # CRITICAL — 2026-04-07 incident postmortem:
          # 这个 workflow 之前调用 `openclaw gateway restart` / `openclaw doctor --fix` 等
          # CLI 命令做 fallback。新版本 openclaw 2026.4.5 的 plugin loader 在 disabled
          # plugin 上有 regression：每次启动 CLI 都会陷入紧凑同步重试循环，100% CPU
          # 烧 V8 解释器。这些 child 进程接收不到 SIGTERM，timeout 命令也杀不动它们；
          # macOS self-hosted runner 因为等这些命令完成而被卡死(这就是用户描述的"runner
          # 也断网了"的原因)。
          # 修复:完全不调用 openclaw CLI。所有操作走 launchctl(管理 launchd 服务)+
          # pkill -9(清理孤儿)+ HTTP(通过 sasha-doctor 触发智能修复)。
          purge_orphans() {
            pkill -9 -f openclaw-channels 2>/dev/null || true
            pkill -9 -f openclaw-gateway 2>/dev/null || true
            sleep 1
          }

          restart_service() {
            local label="$1"
            local plist="$2"
            echo "  [$label] attempting restart..."

            if launchctl kickstart -k "gui/${UID_NUM}/${label}" 2>/dev/null; then
              echo "  [$label] ok via kickstart"
              return 0
            fi

            echo "  [$label] kickstart failed, bootout+bootstrap..."
            launchctl bootout "gui/${UID_NUM}/${label}" 2>/dev/null || true
            sleep 1
            if [ -f "$HOME/Library/LaunchAgents/${plist}" ]; then
              launchctl bootstrap "gui/${UID_NUM}" "$HOME/Library/LaunchAgents/${plist}" 2>/dev/null
              echo "  [$label] bootstrapped"
              return 0
            else
              echo "  [$label] plist not found: ${plist}"
              return 1
            fi
          }

          if [ "${ACTION}" = "force-restart" ]; then
            echo "--- Force restart all ---"

            echo "[gateway] purging orphans first..."
            purge_orphans
            echo "[gateway] kickstarting via launchctl..."
            restart_service "ai.openclaw.gateway" "ai.openclaw.gateway.plist"
            sleep 2

            echo "[sasha-doctor]"
            restart_service "com.sasha.doctor" "com.sasha.doctor.plist"

            echo "[cloudflared]"
            restart_service "com.cloudflare.cloudflared" "com.cloudflare.cloudflared.plist"

            echo "[webchat]"
            restart_service "com.webchat.nextjs" "com.webchat.nextjs.plist"

          else
            echo "--- Smart restart ---"

            RESPONSE=$(curl -sf --max-time 30 -X POST \
              -H "Authorization: Bearer $SASHA_TOKEN" \
              -H "Content-Type: application/json" \
              -w "\nHTTP:%{http_code}" \
              "$SASHA_URL/restart-smart" 2>&1) || true

            HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP:" | sed 's/HTTP://')

            if [ "$HTTP_CODE" = "200" ]; then
              echo "smart restart via sasha-doctor succeeded"
            else
              echo "sasha-doctor unavailable (HTTP ${HTTP_CODE}), launchctl fallback..."
              # 不再尝试 `openclaw doctor --fix` 或 `openclaw gateway restart`:
              # 这些 CLI 命令本身就是 2026-04-07 死机的引爆器。
              # 直接走 launchctl 路径,纯 launchd 操作零 plugin loader。
              echo "[gateway] purging orphans..."
              purge_orphans
              echo "[gateway] kickstart via launchctl..."
              restart_service "ai.openclaw.gateway" "ai.openclaw.gateway.plist"
              sleep 2
              echo "[sasha-doctor] kickstart..."
              restart_service "com.sasha.doctor" "com.sasha.doctor.plist"
            fi
          fi

          echo "Waiting 10s for stabilization..."
          sleep 10
          echo "=== Done ==="

      - name: 3. 修复后验证
        if: ${{ github.event.inputs.action != 'status-only' }}
        timeout-minutes: 1
        shell: bash --noprofile --norc {0}
        run: |
          echo "=== Verification ==="
          PASS=0
          FAIL=0

          check() {
            local name="$1" url="$2" t="${3:-5}"
            if curl -sf --max-time "$t" "$url" > /dev/null 2>&1; then
              echo "PASS $name"
              PASS=$((PASS+1))
            else
              echo "FAIL $name"
              FAIL=$((FAIL+1))
            fi
          }

          check "Gateway"       "http://127.0.0.1:18789/"
          check "Sasha-Doctor"  "http://127.0.0.1:18795/sasha-doctor/health"
          check "Webchat"       "http://127.0.0.1:3000/api/health"
          check "CF Tunnel"     "https://claw.enderfga.cn/sasha-doctor/health" 10

          echo ""
          echo "Result: ${PASS}/4 passed"

          [ "$FAIL" -gt 1 ] && exit 1
          exit 0

      - name: 4. 导出日志
        if: always()
        timeout-minutes: 1
        shell: bash --noprofile --norc {0}
        run: |
          echo "=== Healthcheck Log (last 30 lines) ==="
          tail -30 ~/.openclaw/logs/healthcheck.log 2>/dev/null || echo "no log file"
          echo ""
          echo "=== Sasha-Doctor Log (last 50 lines) ==="
          tail -50 ~/.openclaw/logs/sasha-doctor.log 2>/dev/null || echo "no log file"
          echo ""
          echo "=== Gateway Log (last 50 lines) ==="
          # 尝试多个可能的日志路径
          GLOG=$(ls -t /tmp/openclaw/openclaw-*.log ~/.openclaw/logs/gateway*.log 2>/dev/null | head -1)
          if [ -n "$GLOG" ]; then
            echo "Source: $GLOG"
            tail -50 "$GLOG"
          else
            echo "no gateway log found"
          fi
