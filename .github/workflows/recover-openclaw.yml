name: emergency-recover-openclaw

on:
  workflow_dispatch:

jobs:
  recover:
    runs-on: self-hosted
    steps:
      - name: 1. Check Native Status (检查原生状态)
        run: |
          echo "=== Daemon Status ===" > status.log
          openclaw daemon status --no-color >> status.log 2>&1 || true
          echo "=== Gateway Status ===" >> status.log
          openclaw gateway status --no-color >> status.log 2>&1 || true

      - name: 2. Collect Official Logs (提取原生日志)
        run: |
          echo "=== Exporting OpenClaw Logs ===" > crash_report.log
          # 直接使用官方命令调取日志，规避了猜错本地日志路径的风险
          openclaw logs --no-color | tail -n 500 >> crash_report.log 2>&1 || true
          openclaw daemon logs --no-color | tail -n 500 >> crash_report.log 2>&1 || true

      - name: 3. Run Official Diagnostics (运行官方诊断)
        run: |
          echo "=== Running OpenClaw Doctor & Health Check ===" > diagnostic.log
          openclaw doctor --no-color >> diagnostic.log 2>&1 || true
          openclaw health --no-color >> diagnostic.log 2>&1 || true

      - name: 4. Safe Restart (原生命令安全重启)
        run: |
          echo "=== Restarting OpenClaw Service ==="
          # 优先尝试重启 daemon 守护进程，如果失败则尝试重启独立 gateway
          openclaw daemon restart || openclaw gateway restart

          echo "等待 5 秒检查重启后状态..."
          sleep 5
          openclaw gateway status --no-color

      - name: 5. Upload Logs for Analysis (打包上传日志)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-crash-logs
          retention-days: 3
          path: |
            status.log
            crash_report.log
            diagnostic.log
