name: emergency-recover-openclaw

on:
  workflow_dispatch:

jobs:
  recover:
    runs-on: self-hosted
    # 核心修复：强行把 Homebrew 的路径塞进系统变量，让它能找到 node 和 openclaw
    env:
      PATH: "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
    steps:
      - name: Force Restart OpenClaw (强制复活)
        run: |
          echo "=== 正在执行强行重启指令 ==="
          
          # 优先尝试重启 daemon 守护进程，如果失败则尝试重启独立 gateway
          openclaw daemon restart || openclaw gateway restart
          
          echo "等待 5 秒检查状态..."
          sleep 5
          
          # 确认是否存活
          openclaw gateway status --no-color
